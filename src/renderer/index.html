<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'">
  <title>ClipboardHero</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="titlebar" id="titlebar">
    <span class="title">ClipboardHero</span>
    <div class="titlebar-actions">
      <button id="settings-btn" class="titlebar-btn" title="Settings">&#9881;</button>
      <span class="shortcut-hint">Cmd+Shift+V</span>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search clipboard history..." autofocus>
  </div>

  <div class="category-tabs">
    <button class="category-tab active" data-category="all">All</button>
    <button class="category-tab" data-category="code">Code</button>
    <button class="category-tab" data-category="url">URL</button>
    <button class="category-tab" data-category="email">Email</button>
    <button class="category-tab" data-category="phone">Phone</button>
    <button class="category-tab" data-category="text">Text</button>
  </div>

  <div class="content">
    <div id="clip-list" class="clip-list"></div>
    <div id="preview-panel" class="preview-panel">
      <pre id="preview-content"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span id="clip-count">0 clips</span>
    <span id="status-info"></span>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="settings-overlay">
    <div class="settings-modal">
      <div class="settings-header">
        <span>Settings</span>
        <button id="settings-close" class="settings-close">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-group">
          <label for="setting-max-clips">Max history size</label>
          <input type="number" id="setting-max-clips" min="100" max="10000" step="100">
        </div>
        <div class="settings-group">
          <label for="setting-polling">Polling interval</label>
          <select id="setting-polling">
            <option value="250">250ms (fast)</option>
            <option value="500">500ms (default)</option>
            <option value="1000">1s (battery saver)</option>
            <option value="2000">2s (minimal)</option>
          </select>
        </div>
        <div class="settings-group">
          <label class="checkbox-label">
            <input type="checkbox" id="setting-launch-login">
            Launch at login
          </label>
        </div>
      </div>
      <div class="settings-footer">
        <button id="settings-cancel" class="btn-secondary">Cancel</button>
        <button id="settings-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
